<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C8456B" />

    <!-- Primary SEO -->
    <title>Fusible Beads Studio — Turn images into bead patterns</title>
    <meta
      name="description"
      content="Free online fusible bead (perler/hama) pattern maker. Upload any image and convert it into a bead pattern in your browser, edit bead by bead, then export a high-res PNG or a PDF with a material list. Runs locally — your data never leaves your device."
    />
    <meta
      name="keywords"
      content="fusible beads, perler beads, hama beads, bead pattern maker, pixel art, image to bead pattern, 拼豆, 拼豆图纸, 豆图生成"
    />
    <meta name="author" content="Fusible Beads Studio" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="%SITE_URL%" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fusible Beads Studio" />
    <meta property="og:title" content="Fusible Beads Studio — Turn images into bead patterns" />
    <meta
      property="og:description"
      content="Upload an image, convert it to a fusible bead pattern in the browser, fine-tune each bead, then export a high-res PNG or PDF with a material list."
    />
    <meta property="og:url" content="%SITE_URL%" />
    <meta property="og:image" content="%SITE_URL%og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fusible Beads Studio — Turn images into bead patterns" />
    <meta
      name="twitter:description"
      content="Upload an image, convert it to a fusible bead pattern in the browser, fine-tune each bead, then export a high-res PNG or PDF with a material list."
    />
    <meta name="twitter:image" content="%SITE_URL%og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Fusible Beads Studio",
        "url": "%SITE_URL%",
        "description": "Free online fusible bead pattern maker. Convert any image into a bead pattern in your browser, edit bead by bead, and export a high-res PNG or PDF with a material list.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript and HTML5 Canvas",
        "inLanguage": ["en", "zh-CN"],
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
